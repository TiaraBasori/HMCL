name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: 'jdk+fx'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: never

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --parallel
        env:
          MICROSOFT_AUTH_ID: ${{ secrets.MICROSOFT_AUTH_ID }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp HMCL/build/libs/HMCL-*.jar artifacts/ 2>/dev/null || true
          cp HMCL/build/libs/HMCL-*.exe artifacts/ 2>/dev/null || true
          cp HMCL/build/libs/HMCL-*.sh artifacts/ 2>/dev/null || true
          cp HMCL/build/libs/HMCL-*.deb artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Generate release notes
        run: |
          echo "**Fork of HMCL with offline account restriction removed.**" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Based on upstream tag: ${{ github.ref_name }}" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Changes from upstream:" >> RELEASE_NOTES.md
          echo "- Removed the RESTRICTED gate that disables offline account creation outside China mainland" >> RELEASE_NOTES.md
          echo "- Removed the requirement to sign in with a Microsoft account before using offline accounts" >> RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: artifacts/*
          fail_on_unmatched_files: false