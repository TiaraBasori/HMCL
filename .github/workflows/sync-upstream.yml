name: Sync Upstream

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN || secrets.PAT_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/HMCL-dev/HMCL.git
          git fetch upstream --no-tags

      - name: Configure git
        run: |
          git config user.name "TiaraBasori"
          git config user.email "tiara@basori.dev"

      - name: Merge upstream/main
        id: merge
        continue-on-error: true
        run: |
          git checkout main
          if git merge upstream/main --no-edit 2>&1; then
            echo "merge_clean=true" >> $GITHUB_OUTPUT
          else
            echo "merge_clean=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-resolve conflicts in our custom files
        if: steps.merge.outputs.merge_clean == 'false'
        run: |
          FILES=(
            "HMCL/src/main/java/org/jackhuang/hmcl/ui/account/AccountListPage.java"
            "HMCL/src/main/java/org/jackhuang/hmcl/setting/Accounts.java"
          )
          for file in "${FILES[@]}"; do
            if git ls-files -u -- "$file" | grep -q .; then
              echo "Resolving conflict in $file (keeping our version)"
              git checkout --ours "$file"
              git add "$file"
            fi
          done

      - name: Check for remaining conflicts
        if: steps.merge.outputs.merge_clean == 'false'
        run: |
          CONFLICTS=$(git diff --name-only --diff-filter=U)
          if [ -n "$CONFLICTS" ]; then
            echo "Unresolved conflicts in:"
            echo "$CONFLICTS"
            exit 1
          fi

      - name: Push main
        run: git push origin main

      - name: Collect upstream release tags
        id: tags
        run: |
          # Get upstream release tags (sorted newest first)
          UPSTREAM_TAGS=$(git ls-remote --tags upstream 'v*' 2>/dev/null | awk '{print $2}' | sed 's|refs/tags/||' | sort -rV | head -10)
          NEW_TAGS=""
          for tag in $UPSTREAM_TAGS; do
            # Skip if tag already exists in our repo
            if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
              continue
            fi
            # Get upstream commit for this tag
            UPSTREAM_SHA=$(git ls-remote --tags upstream "$tag" 2>/dev/null | awk '{print $1}')
            if [ -z "$UPSTREAM_SHA" ]; then
              continue
            fi
            # Check if upstream commit is in our history
            if git merge-base --is-ancestor "$UPSTREAM_SHA" HEAD 2>/dev/null; then
              echo "New release tag: $tag ($UPSTREAM_SHA)"
              NEW_TAGS="$NEW_TAGS $tag"
            fi
          done
          echo "new_tags=${NEW_TAGS}" >> $GITHUB_OUTPUT

      - name: Tag our merged commits for upstream releases
        if: steps.tags.outputs.new_tags != ''
        run: |
          for tag in ${{ steps.tags.outputs.new_tags }}; do
            echo "Creating tag $tag on our fork"
            git tag -f "$tag" HEAD
          done
          git push origin --tags
