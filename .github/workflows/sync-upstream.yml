name: Sync Upstream

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/HMCL-dev/HMCL.git
          git fetch upstream

      - name: Configure git
        run: |
          git config user.name "TiaraBasori"
          git config user.email "tiara@basori.dev"

      - name: Merge upstream/main
        id: merge
        continue-on-error: true
        run: |
          git checkout main
          git merge upstream/main --no-edit 2>&1 || echo "merge_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Resolve conflicts in our custom files
        if: steps.merge.outputs.merge_exit_code != ''
        run: |
          FILES=(
            "HMCL/src/main/java/org/jackhuang/hmcl/ui/account/AccountListPage.java"
            "HMCL/src/main/java/org/jackhuang/hmcl/setting/Accounts.java"
          )
          for file in "${FILES[@]}"; do
            if git ls-files -u -- "$file" | grep -q .; then
              echo "Resolving conflict in $file (keeping our version)"
              git checkout --ours "$file"
              git add "$file"
            fi
          done

      - name: Check for remaining conflicts
        run: |
          CONFLICTS=$(git diff --name-only --diff-filter=U)
          if [ -n "$CONFLICTS" ]; then
            echo "Unresolved conflicts in:"
            echo "$CONFLICTS"
            exit 1
          fi
          echo "No remaining conflicts."

      - name: Push changes
        run: git push origin main