name: Nightly Release

on:
  workflow_run:
    workflows: ["Sync Upstream"]
    types:
      - completed
  schedule:
    - cron: '30 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN || secrets.PAT_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all platforms
        run: ./gradlew clean makeExecutables makeDeb -x test --no-daemon

      - name: Generate nightly tag
        id: tag
        run: |
          DATE=$(date -u +'%Y%m%d-%H%M')
          echo "tag=nightly-$DATE" >> $GITHUB_OUTPUT
          echo "version=3.nightly-$DATE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: HMCL Nightly ${{ steps.tag.outputs.version }}
          body: |
            Nightly build from commit ${{ github.sha }}
            Built at $(date -u)
          draft: false
          files: |
            HMCL/build/libs/*.jar
            HMCL/build/libs/*.exe
            HMCL/build/libs/*.sh
            HMCL/build/libs/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.PAT_TOKEN }}
